name: Sjekk Finn for kortkupp

on:
  schedule:
    - cron: '*/5 * * * *'   # kjører hvert 5. minutt, døgnet rundt
  workflow_dispatch:         # lar deg også trykke "Run workflow" manuelt på GitHub

permissions:
  contents: write

jobs:
  sjekk:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer pakker
        run: pip install -r requirements.txt

      - name: Kjør sjekken mot Finn.no
        run: python scraper.py

      - name: Publiser eventuelle nye funn
        run: |
          git config user.name "Kortvakt-boten"
          git config user.email "actions@github.com"
          git add funn.json data/sett_annonser.json
          git diff --cached --quiet || git commit -m "Automatisk oppdatering"
          git push
