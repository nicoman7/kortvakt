<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kortvakt — billige kortsamlinger på Finn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D16;
    --bg-panel: #121729;
    --bg-panel-raised: #161B2E;
    --text: #E8ECF5;
    --text-dim: #8890A6;
    --yellow: #F5D400;
    --green: #39FF88;
    --orange: #FF8A3D;
    --pink: #FF4D8D;
    --line: rgba(245, 212, 0, 0.16);
    --line-soft: rgba(255,255,255,0.08);
    --card-shadow: 0 1px 0 rgba(0,0,0,0.2);
    --radius: 16px;
  }

  html[data-theme="light"] {
    --bg: #F5F3FA;
    --bg-panel: #FFFFFF;
    --bg-panel-raised: #FFFFFF;
    --text: #1C1B29;
    --text-dim: #6B6980;
    --yellow: #C98A00;
    --green: #0E9E63;
    --orange: #E05F17;
    --pink: #E23570;
    --line: rgba(28,27,41,0.12);
    --line-soft: rgba(28,27,41,0.08);
    --card-shadow: 0 2px 10px rgba(28,27,41,0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at 12% 0%, color-mix(in srgb, var(--green) 10%, transparent), transparent 40%),
      radial-gradient(circle at 88% 8%, color-mix(in srgb, var(--yellow) 9%, transparent), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ---------- Header ---------- */
  header {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    padding-bottom: 20px;
    margin-bottom: 22px;
    border-bottom: 1px solid var(--line);
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 4.4vw, 2.4rem);
    margin: 0;
    letter-spacing: 0.02em;
    color: var(--yellow);
    text-shadow: 0 0 18px color-mix(in srgb, var(--yellow) 40%, transparent);
  }
  h1 span { color: var(--green); text-shadow: 0 0 18px color-mix(in srgb, var(--green) 45%, transparent); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--green);
    border: 1px solid color-mix(in srgb, var(--green) 35%, transparent);
    background: color-mix(in srgb, var(--green) 7%, transparent);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
  }
  .status-dot-wrap { position: relative; width: 10px; height: 10px; }
  .status-dot {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green), 0 0 12px var(--green);
  }
  .status-dot-ring {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1.5px solid var(--green);
    animation: ping 1.8s cubic-bezier(0,0,0.2,1) infinite;
  }
  @keyframes ping {
    0% { transform: scale(0.6); opacity: 0.9; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  .theme-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .theme-toggle:hover { border-color: var(--yellow); transform: translateY(-1px); }
  .theme-toggle:focus-visible { outline: 2px solid var(--yellow); outline-offset: 2px; }

  .tagline {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin: 16px 0 0;
  }

  /* ---------- Terminal / live log ---------- */
  .terminal {
    background: color-mix(in srgb, var(--bg) 92%, black 8%);
    border: 1px solid color-mix(in srgb, var(--green) 30%, transparent);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 16px 0 26px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--green);
    height: 136px;
    overflow: hidden;
    position: relative;
  }
  .terminal-header {
    display: flex;
    justify-content: space-between;
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }
  .terminal-lines { display: flex; flex-direction: column; gap: 2px; }
  .terminal-lines div {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .terminal-lines div.vis { opacity: 1; transform: translateY(0); }
  .terminal-lines div.ut { opacity: 0; transform: translateY(-6px); }
  .terminal-lines .siste::after {
    content: "▌";
    margin-left: 2px;
    animation: blink 1s step-start infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ---------- Tabs ---------- */
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .tab-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: var(--bg-panel);
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--green); }
  .tab-btn.aktiv {
    color: #05070A;
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 14px color-mix(in srgb, var(--green) 45%, transparent);
    font-weight: 700;
  }
  .tab-btn:focus-visible { outline: 2px solid var(--yellow); outline-offset: 2px; }

  .sport-tabs { margin-bottom: 22px; }
  .sport-btn.aktiv[data-sport="pokemon"] { background: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 14px color-mix(in srgb, var(--yellow) 45%, transparent); }
  .sport-btn.aktiv[data-sport="fotball"] { background: var(--green); border-color: var(--green); box-shadow: 0 0 14px color-mix(in srgb, var(--green) 45%, transparent); }
  .sport-btn.aktiv[data-sport="basketball"] { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 14px color-mix(in srgb, var(--orange) 45%, transparent); }
  .sport-btn.aktiv[data-sport="alt"] { background: var(--text); border-color: var(--text); color: var(--bg); }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--text-dim);
    padding-bottom: 18px;
  }
  #refresh-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
  }
  #refresh-btn:hover { border-color: var(--yellow); color: var(--yellow); }
  #refresh-btn:focus-visible { outline: 2px solid var(--yellow); outline-offset: 2px; }

  /* ---------- Grid & cards ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
    gap: 22px;
  }

  .card {
    position: relative;
    padding: 3px;
    border-radius: calc(var(--radius) + 3px);
    background: linear-gradient(150deg, var(--yellow), var(--green) 55%, var(--orange));
    transition: transform 0.18s ease;
  }
  .card:hover { transform: translateY(-4px); }

  .card-inner {
    position: relative;
    background: var(--bg-panel-raised);
    border-radius: var(--radius);
    padding: 20px 18px 18px;
    overflow: hidden;
    height: 100%;
    box-shadow: var(--card-shadow);
  }
  .card-inner::after {
    content: "";
    position: absolute;
    inset: -60%;
    background: linear-gradient(115deg,
      transparent 25%,
      color-mix(in srgb, var(--yellow) 22%, transparent) 40%,
      color-mix(in srgb, var(--green) 30%, transparent) 50%,
      color-mix(in srgb, var(--yellow) 22%, transparent) 60%,
      transparent 75%);
    transform: translateX(-130%) rotate(8deg);
    transition: transform 0.7s ease;
    pointer-events: none;
  }
  .card:hover .card-inner::after { transform: translateX(15%) rotate(8deg); }

  .heart-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    border: 1px solid var(--line-soft);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
    z-index: 2;
  }
  .heart-btn:hover { border-color: var(--pink); color: var(--pink); }
  .heart-btn.aktiv { color: var(--pink); border-color: var(--pink); }
  .heart-btn:focus-visible { outline: 2px solid var(--yellow); outline-offset: 2px; }

  .price-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13.5px;
    color: #05070A;
    background: var(--yellow);
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 12px;
  }
  .price-tag.bud {
    background: transparent;
    border: 1.5px dashed var(--orange);
    color: var(--orange);
  }

  .card-inner h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 17.5px;
    line-height: 1.3;
    margin: 0 44px 14px 0;
    color: var(--text);
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #05070A;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    text-decoration: none;
    padding: 9px 16px;
    border-radius: 999px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    margin-top: 4px;
  }
  .cta-btn:hover { transform: scale(1.04); box-shadow: 0 0 18px color-mix(in srgb, var(--green) 55%, transparent); }
  .cta-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .found-at {
    display: block;
    margin-top: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
  }

  .kategori-merke {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
  }
  .empty strong {
    display: block;
    font-family: 'Orbitron', sans-serif;
    color: var(--yellow);
    font-size: 17px;
    margin-bottom: 8px;
  }

  footer {
    text-align: center;
    margin-top: 50px;
    font-size: 11.5px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  @media (prefers-reduced-motion: reduce) {
    .status-dot-ring, .card-inner::after, .terminal-lines .siste::after { animation: none; }
    .card, .terminal-lines div { transition: none; }
  }

  @media (max-width: 560px) {
    header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>KORT<span>VAKT</span></h1>
      <div class="header-right">
        <div class="status-pill">
          <span class="status-dot-wrap"><span class="status-dot"></span><span class="status-dot-ring"></span></span>
          BOT STATUS: ONLINE
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button">🌙 Mørk</button>
      </div>
    </header>
    <p class="tagline">// Skanner Finn.no etter Pokémon-, fotball- og basketballkort, døgnet rundt.</p>

    <div class="terminal">
      <div class="terminal-header"><span>LIVE BOT LOGG</span><span>kortvakt.exe</span></div>
      <div id="terminal-lines" class="terminal-lines"></div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn aktiv" data-fane="alle">🗂️ Alle</button>
      <button class="tab-btn" data-fane="store_samlinger">📦 Store samlinger</button>
      <button class="tab-btn" data-fane="sjeldne_glins">✨ Sjeldne &amp; glins</button>
      <button class="tab-btn" data-fane="andre">🃏 Andre treff</button>
      <button class="tab-btn" data-fane="pris_pa_foresporsel">💬 Pris på forespørsel</button>
      <button class="tab-btn" data-fane="favoritter">⭐ Mine favoritter</button>
    </div>

    <div class="tabs sport-tabs" id="sport-tabs">
      <button class="tab-btn sport-btn aktiv" data-sport="alt">Alt</button>
      <button class="tab-btn sport-btn" data-sport="pokemon">🟡 Pokémon</button>
      <button class="tab-btn sport-btn" data-sport="fotball">🟢 Fotballkort</button>
      <button class="tab-btn sport-btn" data-sport="basketball">🟠 Basketballkort</button>
    </div>

    <div class="status-bar">
      <span id="status-text">Laster...</span>
      <button id="refresh-btn" type="button">Oppdater</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <footer>Bygget for å fange kortkupp før noen andre gjør det.</footer>

  <script>
    const FAVORITT_NOKKEL = 'kortvakt_favoritter';
    const TEMA_NOKKEL = 'kortvakt_tema';
    let alleFunn = [];
    let aktivFane = 'alle';
    let aktivSport = 'alt';

    const grid = document.getElementById('grid');
    const statusText = document.getElementById('status-text');
    const refreshBtn = document.getElementById('refresh-btn');
    const tabsEl = document.getElementById('tabs');
    const sportTabsEl = document.getElementById('sport-tabs');
    const themeToggle = document.getElementById('theme-toggle');

    // ---------- Tema (lys/mørk) ----------
    function settTema(tema) {
      document.documentElement.setAttribute('data-theme', tema);
      themeToggle.textContent = tema === 'dark' ? '🌙 Mørk' : '☀️ Lys';
      localStorage.setItem(TEMA_NOKKEL, tema);
    }
    (function lastTema() {
      const lagret = localStorage.getItem(TEMA_NOKKEL);
      settTema(lagret === 'light' ? 'light' : 'dark');
    })();
    themeToggle.addEventListener('click', () => {
      const naavaerende = document.documentElement.getAttribute('data-theme');
      settTema(naavaerende === 'dark' ? 'light' : 'dark');
    });

    // ---------- Favoritter (localStorage) ----------
    function hentFavoritter() {
      try { return JSON.parse(localStorage.getItem(FAVORITT_NOKKEL) || '[]'); }
      catch (e) { return []; }
    }
    function lagreFavoritter(liste) { localStorage.setItem(FAVORITT_NOKKEL, JSON.stringify(liste)); }
    function erFavoritt(lenke) { return hentFavoritter().includes(lenke); }
    function toggleFavoritt(lenke) {
      let liste = hentFavoritter();
      liste = liste.includes(lenke) ? liste.filter(l => l !== lenke) : [...liste, lenke];
      lagreFavoritter(liste);
      tegnKort();
    }

    // ---------- Tid ----------
    function relativTid(isoStreng) {
      if (!isoStreng) return '';
      const da = new Date(isoStreng);
      const sekunder = Math.floor((new Date() - da) / 1000);
      if (sekunder < 60) return 'akkurat nå';
      const minutter = Math.floor(sekunder / 60);
      if (minutter < 60) return `for ${minutter} min siden`;
      const timer = Math.floor(minutter / 60);
      if (timer < 24) return `for ${timer} t siden`;
      return `for ${Math.floor(timer / 24)} d siden`;
    }

    const KATEGORI_NAVN = {
      store_samlinger: '📦 Stor samling',
      sjeldne_glins: '✨ Sjelden / glins',
      andre: '🃏 Kort',
      pris_pa_foresporsel: '💬 Pris på forespørsel',
    };

    function finnSport(tittel) {
      const t = (tittel || '').toLowerCase();
      if (t.includes('pokemon') || t.includes('pokémon')) return 'pokemon';
      if (t.includes('fotball')) return 'fotball';
      if (t.includes('basketball') || t.includes('nba')) return 'basketball';
      return 'annet';
    }

    // ---------- Rendring ----------
    function lagKort(funn) {
      const erNytt = funn.funnet && (new Date() - new Date(funn.funnet)) < 60 * 60 * 1000;
      const budAnnonse = !!funn.pris_pa_foresporsel;
      const pris = budAnnonse
        ? '💬 Kom med bud / spør'
        : ((funn.pris !== null && funn.pris !== undefined) ? `${funn.pris} kr` : 'Pris ikke oppgitt');
      const kategori = funn.kategori || 'andre';
      const favoritt = erFavoritt(funn.lenke);

      const kort = document.createElement('article');
      kort.className = 'card';
      kort.innerHTML = `
        <div class="card-inner">
          <button class="heart-btn ${favoritt ? 'aktiv' : ''}" data-lenke="${funn.lenke}" aria-label="Legg til i favoritter">${favoritt ? '♥' : '♡'}</button>
          <span class="kategori-merke">${KATEGORI_NAVN[kategori] || '🃏 Kort'}${erNytt ? ' · NYTT' : ''}</span>
          <span class="price-tag ${budAnnonse ? 'bud' : ''}">${pris}</span>
          <h2>${funn.tittel}</h2>
          <div><a class="cta-btn" href="${funn.lenke}" target="_blank" rel="noopener">🔗 Åpne på Finn.no</a></div>
          <span class="found-at">Funnet ${relativTid(funn.funnet)}</span>
        </div>
      `;
      return kort;
    }

    function filtrerFunn() {
      let liste = alleFunn;

      if (aktivFane === 'favoritter') {
        const fav = hentFavoritter();
        liste = liste.filter(f => fav.includes(f.lenke));
      } else if (aktivFane !== 'alle') {
        liste = liste.filter(f => (f.kategori || 'andre') === aktivFane);
      }

      if (aktivSport !== 'alt') {
        liste = liste.filter(f => finnSport(f.tittel) === aktivSport);
      }

      return liste;
    }

    function tomMelding() {
      if (aktivFane === 'favoritter') {
        return { tittel: 'Ingen favoritter ennå', tekst: 'Trykk på hjertet på et kort for å lagre det her.' };
      }
      if (aktivFane === 'pris_pa_foresporsel') {
        return { tittel: 'Ingen slike ennå', tekst: 'Her havner annonser der selgeren skriver "kom med bud" eller "spør om pris" i stedet for en fast pris.' };
      }
      return { tittel: 'Ingen treff ennå', tekst: 'Roboten sjekker Finn jevnlig. Denne siden oppdaterer seg selv når den finner noe.' };
    }

    function tegnKort() {
      const funnListe = filtrerFunn();
      grid.innerHTML = '';

      if (funnListe.length === 0) {
        const m = tomMelding();
        grid.innerHTML = `<div class="empty"><strong>${m.tittel}</strong>${m.tekst}</div>`;
        return;
      }
      funnListe.forEach(f => grid.appendChild(lagKort(f)));
    }

    // ---------- Faner ----------
    tabsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('aktiv'));
      btn.classList.add('aktiv');
      aktivFane = btn.dataset.fane;
      tegnKort();
    });

    sportTabsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.sport-btn');
      if (!btn) return;
      sportTabsEl.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('aktiv'));
      btn.classList.add('aktiv');
      aktivSport = btn.dataset.sport;
      tegnKort();
    });

    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.heart-btn');
      if (!btn) return;
      toggleFavoritt(btn.dataset.lenke);
    });

    // ---------- Henter data ----------
    async function lastFunn() {
      statusText.textContent = 'Laster...';
      try {
        const respons = await fetch(`funn.json?_=${Date.now()}`, { cache: 'no-store' });
        const data = await respons.json();
        alleFunn = data.funn || [];
        tegnKort();
        statusText.textContent = data.sist_sjekket
          ? `Sist sjekket ${relativTid(data.sist_sjekket)} · ${alleFunn.length} treff totalt`
          : `${alleFunn.length} treff totalt`;
      } catch (e) {
        statusText.textContent = 'Klarte ikke å laste funn.json ennå.';
      }
    }

    refreshBtn.addEventListener('click', lastFunn);
    lastFunn();
    setInterval(lastFunn, 60 * 1000);

    // ---------- Simulert live-logg (med smooth inn/ut-animasjon) ----------
    const logLinjer = document.getElementById('terminal-lines');
    const logMaler = [
      'Skanner Finn.no etter kortsamlinger...',
      'Sjekker pris- og nøkkelordfilter...',
      'Analyserer nye annonser...',
      'Sammenligner mot tidligere sette annonser...',
      'Ingen nye treff i denne runden.',
      'Venter til neste sjekk...',
    ];

    function leggTilLoggLinje() {
      const tid = new Date().toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
      const tekst = logMaler[Math.floor(Math.random() * logMaler.length)];

      [...logLinjer.children].forEach(l => l.classList.remove('siste'));

      const linje = document.createElement('div');
      linje.className = 'siste';
      linje.textContent = `[${tid}] ${tekst}`;
      logLinjer.appendChild(linje);

      // Trigger inn-animasjon på neste frame
      requestAnimationFrame(() => requestAnimationFrame(() => linje.classList.add('vis')));

      // Fjern eldste linjer med en myk fade-ut i stedet for brått kutt
      while (logLinjer.children.length > 6) {
        const eldste = logLinjer.firstChild;
        eldste.classList.remove('vis');
        eldste.classList.add('ut');
        setTimeout(() => eldste.remove(), 450);
        break;
      }
    }
    leggTilLoggLinje();
    setInterval(leggTilLoggLinje, 4000);
  </script>
</body>
</html>
