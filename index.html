<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kortvakt — billige kortsamlinger på Finn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EDEFE6;
    --paper-raised: #F6F7F1;
    --ink: #202E23;
    --ink-soft: #5A6A5C;
    --gold: #B0812C;
    --teal: #2E7A6C;
    --rust: #B14B3C;
    --line: rgba(32, 46, 35, 0.14);
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(32,46,35,0.06) 1px, transparent 0);
    background-size: 22px 22px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 20px;
    margin-bottom: 8px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand-mark {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: var(--teal);
    border: 1.5px solid var(--teal);
    border-radius: 999px;
    padding: 3px 10px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    margin: 0;
    letter-spacing: -0.01em;
  }

  .tagline {
    font-size: 15px;
    color: var(--ink-soft);
    max-width: 30ch;
    text-align: right;
    line-height: 1.4;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    padding: 14px 0 30px;
  }

  #refresh-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: none;
    border: 1.5px solid var(--ink);
    color: var(--ink);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #refresh-btn:hover { background: var(--ink); color: var(--paper-raised); }
  #refresh-btn:focus-visible { outline: 3px solid var(--teal); outline-offset: 2px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 22px;
  }

  .card {
    position: relative;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 18px 18px;
    box-shadow: 0 1px 0 rgba(32,46,35,0.04);
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--gold), var(--teal) 60%, var(--gold));
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(32,46,35,0.12);
  }

  .card a.card-link:focus-visible {
    outline: 3px solid var(--teal);
    outline-offset: 3px;
    border-radius: 8px;
  }

  .ribbon {
    position: absolute;
    top: 14px;
    right: -32px;
    transform: rotate(38deg);
    background: var(--rust);
    color: var(--paper-raised);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 3px 38px;
  }

  .price-tag {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    color: var(--gold);
    border: 1.5px dashed var(--gold);
    border-radius: 8px;
    padding: 3px 10px;
    transform: rotate(-2deg);
    margin-bottom: 12px;
  }

  .card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    line-height: 1.3;
    margin: 0 0 14px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1px;
  }
  .card-link:hover { color: var(--teal); border-color: var(--teal); }

  .found-at {
    display: block;
    margin-top: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }

  .empty {
    text-align: center;
    padding: 70px 20px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    border: 1.5px dashed var(--line);
    border-radius: var(--radius);
  }
  .empty strong {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    color: var(--ink);
    font-size: 20px;
    margin-bottom: 8px;
  }

  footer {
    text-align: center;
    margin-top: 60px;
    font-size: 12px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }

  @media (max-width: 560px) {
    header { flex-direction: column; align-items: flex-start; }
    .tagline { text-align: left; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="brand-mark">Kortvakt</span>
      </div>
      <p class="tagline">Skanner Finn.no etter billige Pokémon- og fotballkort, døgnet rundt.</p>
    </header>

    <h1>Nyeste kortkupp</h1>

    <div class="status-bar">
      <span id="status-text">Laster...</span>
      <button id="refresh-btn" type="button">Oppdater</button>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <footer>Bygget for å fange kortkupp før noen andre gjør det.</footer>

  <script>
    const grid = document.getElementById('grid');
    const statusText = document.getElementById('status-text');
    const refreshBtn = document.getElementById('refresh-btn');

    function relativTid(isoStreng) {
      if (!isoStreng) return '';
      const da = new Date(isoStreng);
      const na = new Date();
      const sekunder = Math.floor((na - da) / 1000);

      if (sekunder < 60) return 'akkurat nå';
      const minutter = Math.floor(sekunder / 60);
      if (minutter < 60) return `for ${minutter} min siden`;
      const timer = Math.floor(minutter / 60);
      if (timer < 24) return `for ${timer} t siden`;
      const dager = Math.floor(timer / 24);
      return `for ${dager} d siden`;
    }

    function lagKort(funn) {
      const erNytt = funn.funnet && (new Date() - new Date(funn.funnet)) < 60 * 60 * 1000;
      const pris = funn.pris !== null && funn.pris !== undefined
        ? `${funn.pris} kr`
        : 'Pris ikke oppgitt';

      const kort = document.createElement('article');
      kort.className = 'card';
      kort.innerHTML = `
        ${erNytt ? '<span class="ribbon">NYTT</span>' : ''}
        <span class="price-tag">${pris}</span>
        <h2>${funn.tittel}</h2>
        <a class="card-link" href="${funn.lenke}" target="_blank" rel="noopener">Se annonsen &rarr;</a>
        <span class="found-at">Funnet ${relativTid(funn.funnet)}</span>
      `;
      return kort;
    }

    async function lastFunn() {
      statusText.textContent = 'Laster...';
      try {
        const respons = await fetch(`funn.json?_=${Date.now()}`, { cache: 'no-store' });
        const data = await respons.json();
        const funnListe = data.funn || [];

        grid.innerHTML = '';

        if (funnListe.length === 0) {
          grid.innerHTML = `
            <div class="empty" style="grid-column: 1 / -1;">
              <strong>Ingen treff ennå</strong>
              Roboten sjekker Finn hvert 5. minutt. Denne siden oppdaterer seg selv når den finner noe.
            </div>`;
        } else {
          funnListe.forEach(funn => grid.appendChild(lagKort(funn)));
        }

        statusText.textContent = data.sist_sjekket
          ? `Sist sjekket ${relativTid(data.sist_sjekket)} · ${funnListe.length} treff totalt`
          : `${funnListe.length} treff totalt`;
      } catch (e) {
        statusText.textContent = 'Klarte ikke å laste funn.json ennå.';
      }
    }

    refreshBtn.addEventListener('click', lastFunn);
    lastFunn();
    setInterval(lastFunn, 60 * 1000); // oppdaterer automatisk hvert minutt
  </script>
</body>
</html>
