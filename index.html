<!DOCTYPE html>
<html lang="no" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kortvakt — billige kortsamlinger på Finn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============ CYBERPUNK TOKENS ============ */
  :root {
    --bg: #060606;
    --bg-panel: #0D0C0A;
    --bg-raised: #14110C;
    --orange: #FF7A00;
    --orange-soft: #FFA347;
    --orange-dim: rgba(255,122,0,0.35);
    --text: #FFE9D6;
    --text-dim: #9A835F;
    --line: rgba(255,122,0,0.28);
    --line-soft: rgba(255,122,0,0.14);
    --glow: 0 0 10px rgba(255,122,0,0.55), 0 0 26px rgba(255,122,0,0.22);
    --glow-soft: 0 0 8px rgba(255,122,0,0.3);
    --radius: 14px;
    --grid-line: rgba(255,122,0,0.05);
  }
  html[data-theme="light"] {
    --bg: #FFF4E8;
    --bg-panel: #FFFFFF;
    --bg-raised: #FFF9F2;
    --orange: #E85D00;
    --orange-soft: #B84A00;
    --orange-dim: rgba(232,93,0,0.3);
    --text: #241505;
    --text-dim: #8A6A45;
    --line: rgba(232,93,0,0.35);
    --line-soft: rgba(232,93,0,0.15);
    --glow: 0 0 0 transparent;
    --glow-soft: 0 2px 10px rgba(232,93,0,0.12);
    --grid-line: rgba(232,93,0,0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0; min-height: 100vh;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    background:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
      radial-gradient(circle at 50% -10%, rgba(255,122,0,0.12), transparent 55%),
      var(--bg);
    background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%;
    transition: background-color 0.4s ease, color 0.3s ease;
    overflow-x: hidden;
  }

  /* Skjuler standard-cursor på enheter med mus - custom cursor tar over */
  @media (hover: hover) and (pointer: fine) {
    body, body a, body button, body input { cursor: none; }
  }

  .cursor-ring, .cursor-dot {
    position: fixed; top: 0; left: 0;
    border-radius: 50%; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    display: none;
  }
  @media (hover: hover) and (pointer: fine) {
    .cursor-ring, .cursor-dot { display: block; }
  }
  .cursor-ring {
    width: 34px; height: 34px;
    border: 1.5px solid var(--orange);
    box-shadow: var(--glow-soft);
    transition: width 0.15s ease, height 0.15s ease;
  }
  .cursor-ring.klikk { width: 26px; height: 26px; }
  .cursor-dot {
    width: 6px; height: 6px;
    background: var(--orange);
    box-shadow: var(--glow);
  }

  .wrap { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 32px 20px 120px; }

  /* ============ HEADER ============ */
  header {
    display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
    gap: 14px; padding-bottom: 20px; margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(1.6rem, 4.4vw, 2.4rem); margin: 0;
    color: var(--orange); letter-spacing: 0.05em;
    text-shadow: var(--glow);
  }
  h1 span { color: var(--text); text-shadow: none; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.06em;
    color: var(--orange); border: 1px solid var(--line);
    background: var(--bg-panel); border-radius: 3px; padding: 7px 14px 7px 10px;
    box-shadow: var(--glow-soft);
  }
  .status-dot-wrap { position: relative; width: 10px; height: 10px; }
  .status-dot { position: absolute; inset: 0; border-radius: 50%; background: var(--orange); box-shadow: var(--glow); }
  .status-dot-ring { position: absolute; inset: -4px; border-radius: 50%; border: 1.5px solid var(--orange); animation: ping 1.8s cubic-bezier(0,0,0.2,1) infinite; }
  @keyframes ping { 0% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(2.2); opacity: 0; } }

  button { font-family: inherit; }
  .theme-toggle, #refresh-btn, .accordion-toggle, .tab-btn, .cta-btn, .heart-btn, .lyd-toggle, .test-btn, .music-btn {
    transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .theme-toggle:active, #refresh-btn:active, .accordion-toggle:active, .tab-btn:active, .cta-btn:active, .heart-btn:active, .music-btn:active { transform: scale(0.94); }

  .theme-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--bg-panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 3px; padding: 8px 14px; cursor: none;
  }
  .theme-toggle:hover { border-color: var(--orange); color: var(--orange); box-shadow: var(--glow-soft); }
  .theme-toggle:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  .tagline { font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin: 14px 0 22px; }
  .tagline::before { content: "> "; color: var(--orange); }

  /* ============ TERMINAL ============ */
  .terminal {
    background: var(--bg-panel);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    color: var(--orange); height: 132px; overflow: hidden; position: relative;
    box-shadow: inset 0 0 30px rgba(255,122,0,0.04);
  }
  .terminal::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.12) 2px 4px);
    opacity: 0.5;
  }
  html[data-theme="light"] .terminal::after { display: none; }
  .terminal-header { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; margin-bottom: 8px; letter-spacing: 0.08em; }
  .terminal-lines { display: flex; flex-direction: column; gap: 2px; position: relative; z-index: 1; }
  .terminal-lines div {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .terminal-lines div.vis { opacity: 1; transform: translateY(0); }
  .terminal-lines div.ut { opacity: 0; transform: translateY(-6px); }
  .terminal-lines .siste::after { content: "▌"; margin-left: 2px; animation: blink 1s step-start infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* ============ FILTER-PANEL ============ */
  .filter-panel {
    background: var(--bg-panel); border: 1px solid var(--line-soft);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 24px;
  }
  .accordion { margin-bottom: 10px; }
  .accordion:last-child { margin-bottom: 0; }
  .accordion-toggle {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--bg-raised); border: 1px solid var(--line-soft); color: var(--text);
    border-radius: 8px; padding: 12px 16px; font-size: 13.5px; font-weight: 600; cursor: none;
  }
  .accordion-toggle:hover { border-color: var(--orange); box-shadow: var(--glow-soft); }
  .accordion-toggle:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }
  .accordion-toggle .chev { transition: transform 0.3s ease; color: var(--text-dim); }
  .accordion-toggle.open .chev { transform: rotate(180deg); }
  .accordion-toggle .valgt { color: var(--orange); font-weight: 700; }

  .accordion-panel { display: grid; grid-template-rows: 0fr; opacity: 0; transition: grid-template-rows 0.32s ease, opacity 0.25s ease; }
  .accordion-panel.open { grid-template-rows: 1fr; opacity: 1; }
  .accordion-inner { overflow: hidden; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 7px; padding-top: 12px; }

  .tab-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--bg-raised); border: 1px solid var(--line-soft); color: var(--text-dim);
    border-radius: 3px; padding: 8px 14px; cursor: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .tab-btn:hover { color: var(--orange); border-color: var(--orange); }
  .tab-btn.aktiv {
    color: #0D0600; background: var(--orange); border-color: var(--orange);
    font-weight: 700; box-shadow: var(--glow);
  }
  .tab-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  .search-input {
    width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 13.5px;
    background: var(--bg-raised); border: 1px solid var(--line-soft); color: var(--text);
    border-radius: 8px; padding: 11px 14px; margin-top: 4px; cursor: none;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { outline: none; border-color: var(--orange); box-shadow: var(--glow-soft); }

  /* ---- Lydpanel ---- */
  .lyd-rad { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 6px; }
  .lyd-info { display: flex; align-items: center; gap: 9px; }
  .lyd-navn { font-size: 13px; font-weight: 600; }
  .test-btn {
    background: none; border: 1px solid var(--line-soft); color: var(--text-dim);
    border-radius: 50%; width: 22px; height: 22px; font-size: 10px; cursor: none;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .test-btn:hover { border-color: var(--orange); color: var(--orange); }
  .lyd-toggle {
    position: relative; width: 38px; height: 21px; border-radius: 999px;
    background: var(--line-soft); cursor: none; flex-shrink: 0; border: none;
  }
  .lyd-toggle::after {
    content: ""; position: absolute; width: 16px; height: 16px; border-radius: 50%;
    background: var(--text-dim); top: 2.5px; left: 3px; transition: all 0.2s ease;
  }
  .lyd-toggle.on { background: var(--orange); box-shadow: var(--glow-soft); }
  .lyd-toggle.on::after { left: 19px; background: #0D0600; }
  .lyd-toggle:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text-dim);
    padding-bottom: 18px;
  }
  #refresh-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    background: var(--bg-panel); border: 1px solid var(--line-soft); color: var(--text-dim);
    border-radius: 3px; padding: 7px 14px; cursor: none;
  }
  #refresh-btn:hover { border-color: var(--orange); color: var(--orange); box-shadow: var(--glow-soft); }
  #refresh-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  /* ============ GRID & CARDS ============ */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(266px, 1fr)); gap: 20px; }

  @keyframes kortInn { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .card {
    position: relative; background: var(--bg-panel);
    border: 1px solid var(--line-soft); border-radius: var(--radius);
    padding: 20px 18px 18px; overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    animation: kortInn 0.45s cubic-bezier(0.16,1,0.3,1) both;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--orange); box-shadow: var(--glow);
  }
  .card:hover { transform: translateY(-4px); border-color: var(--orange); box-shadow: var(--glow-soft); }

  @keyframes heartPop { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
  .heart-btn {
    position: absolute; top: 14px; right: 14px;
    background: var(--bg-raised); border: 1px solid var(--line-soft); color: var(--text-dim);
    width: 32px; height: 32px; border-radius: 50%; cursor: none; font-size: 15px;
    display: flex; align-items: center; justify-content: center; z-index: 2;
  }
  .heart-btn:hover { border-color: var(--orange); color: var(--orange); }
  .heart-btn.aktiv { color: var(--orange); border-color: var(--orange); box-shadow: var(--glow-soft); }
  .heart-btn.pop { animation: heartPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .heart-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  .price-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13.5px;
    color: #0D0600; background: var(--orange); border-radius: 3px; padding: 4px 11px; margin-bottom: 12px;
    box-shadow: var(--glow-soft);
  }
  .price-tag.bud { background: transparent; border: 1.5px dashed var(--orange); color: var(--orange); box-shadow: none; }

  .card h2 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.3; margin: 0 44px 14px 0; color: var(--text); }

  .cta-btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
    color: #0D0600; background: var(--orange); text-decoration: none;
    padding: 9px 16px; border-radius: 3px; margin-top: 4px; cursor: none;
    box-shadow: var(--glow-soft);
  }
  .cta-btn:hover { transform: scale(1.05); box-shadow: var(--glow); }
  .cta-btn:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  .found-at { display: block; margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-dim); }
  .kategori-merke { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.04em; }

  .empty {
    grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 13.5px;
    border: 1px dashed var(--line); border-radius: var(--radius);
    animation: kortInn 0.4s ease both;
  }
  .empty strong { display: block; font-family: 'Orbitron', sans-serif; color: var(--orange); font-size: 16px; margin-bottom: 8px; text-shadow: var(--glow-soft); }

  footer { text-align: center; margin-top: 50px; font-size: 11.5px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  /* ============ MUSIKKSPILLER ============ */
  .music-player {
    position: fixed; bottom: 20px; right: 20px; z-index: 100;
    background: var(--bg-panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 10px 14px;
    box-shadow: var(--glow-soft);
  }
  .now-playing {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
    color: var(--text-dim); margin-bottom: 7px;
    max-width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .now-playing.spiller { color: var(--orange); }
  .now-playing.spiller::before { content: "♪ "; }
  .music-controls { display: flex; align-items: center; gap: 8px; }
  .music-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--orange); border: none; color: #0D0600;
    font-size: 14px; cursor: none; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow);
  }
  .music-btn-liten {
    width: 30px; height: 30px; font-size: 11px;
    background: var(--bg-raised); color: var(--orange);
    border: 1px solid var(--line); box-shadow: none;
  }
  .music-btn:hover { transform: scale(1.08); }
  .music-btn-liten:hover { border-color: var(--orange); box-shadow: var(--glow-soft); }
  .music-btn:focus-visible { outline: 2px solid var(--orange); outline-offset: 3px; }
  .visualizer { display: flex; align-items: flex-end; gap: 2.5px; height: 26px; width: 58px; }
  .visualizer span {
    flex: 1; background: var(--orange); border-radius: 2px 2px 0 0;
    height: 15%; box-shadow: var(--glow-soft);
    transition: height 0.08s ease;
  }
  .vol-wrap { display: flex; align-items: center; gap: 5px; }
  .vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 58px; height: 4px; border-radius: 999px;
    background: var(--line); outline: none; cursor: none;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: var(--orange); box-shadow: var(--glow-soft); cursor: none;
  }
  .vol-slider::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%; border: none;
    background: var(--orange); box-shadow: var(--glow-soft); cursor: none;
  }
  .vol-ikon { font-size: 13px; color: var(--text-dim); }

  /* ============ KRETSKORT-LINJER ============ */
  /* Tynne, glødende linjer som visuelt kobler sammen seksjonene,
     som baner på et kretskort. Tegnes med små hjelpe-elementer. */
  .circuit {
    position: relative;
    height: 26px;
    margin: -6px 0 -4px;
    pointer-events: none;
  }
  .circuit::before, .circuit::after {
    content: ""; position: absolute;
    background: var(--orange);
    box-shadow: var(--glow-soft);
    opacity: 0.65;
  }
  /* Vertikal hovedbane fra forrige boks */
  .circuit::before { left: 38px; top: 0; width: 1.5px; height: 100%; }
  /* Horisontal gren */
  .circuit::after { left: 38px; top: 55%; width: 90px; height: 1.5px; }
  .circuit .node {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange); box-shadow: var(--glow);
    left: 125px; top: calc(55% - 2.5px);
  }
  .circuit .node::after {
    content: ""; position: absolute; inset: -4px; border-radius: 50%;
    border: 1px solid var(--orange); opacity: 0.4;
    animation: ping 2.4s cubic-bezier(0,0,0.2,1) infinite;
  }
  .circuit-2::before { left: auto; right: 60px; }
  .circuit-2::after { left: auto; right: 60px; width: 110px; }
  .circuit-2 .node { left: auto; right: 166px; }
  html[data-theme="light"] .circuit::before,
  html[data-theme="light"] .circuit::after { opacity: 0.4; }

  @media (max-width: 560px) {
    header { flex-direction: column; align-items: flex-start; }
    .music-player .vol-wrap { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .status-dot-ring, .terminal-lines .siste::after, .card, .heart-btn.pop { animation: none; }
    .card, .terminal-lines div, .visualizer span { transition: none; }
    .cursor-ring { transition: none; }
  }
</style>
</head>
<body>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="cursor-dot" id="cursor-dot"></div>

  <div class="wrap">
    <header>
      <h1>KORT<span>VAKT</span></h1>
      <div class="header-right">
        <div class="status-pill">
          <span class="status-dot-wrap"><span class="status-dot"></span><span class="status-dot-ring"></span></span>
          BOT STATUS: ONLINE
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button">🌙 Mørk</button>
      </div>
    </header>
    <p class="tagline">Skanner Finn.no etter Pokémon-, fotball- og basketballkort, døgnet rundt.</p>

    <div class="terminal">
      <div class="terminal-header"><span>LIVE BOT LOGG</span><span>kortvakt.exe</span></div>
      <div id="terminal-lines" class="terminal-lines"></div>
    </div>

    <div class="circuit"><span class="node"></span></div>

    <div class="filter-panel">
      <div class="accordion">
        <button class="accordion-toggle" id="kategori-toggle" type="button">
          <span>🗂️ Kategori: <span class="valgt" id="kategori-valgt">Alle</span></span>
          <span class="chev">▾</span>
        </button>
        <div class="accordion-panel" id="kategori-panel">
          <div class="accordion-inner">
            <div class="pill-row" id="tabs">
              <button class="tab-btn aktiv" data-fane="alle">🗂️ Alle</button>
              <button class="tab-btn" data-fane="store_samlinger">📦 Store samlinger</button>
              <button class="tab-btn" data-fane="sjeldne_glins">✨ Sjeldne &amp; glins</button>
              <button class="tab-btn" data-fane="pris_pa_foresporsel">💬 Pris på forespørsel</button>
              <button class="tab-btn" data-fane="favoritter">⭐ Mine favoritter</button>
            </div>
          </div>
        </div>
      </div>

      <div class="accordion">
        <button class="accordion-toggle" id="sport-toggle" type="button">
          <span>🃏 Korttype: <span class="valgt" id="sport-valgt">Alt</span></span>
          <span class="chev">▾</span>
        </button>
        <div class="accordion-panel" id="sport-panel">
          <div class="accordion-inner">
            <div class="pill-row" id="sport-tabs">
              <button class="tab-btn sport-btn aktiv" data-sport="alt">Alt</button>
              <button class="tab-btn sport-btn" data-sport="pokemon">🟡 Pokémon</button>
              <button class="tab-btn sport-btn" data-sport="fotball">🟢 Fotballkort</button>
              <button class="tab-btn sport-btn" data-sport="basketball">🟠 Basketballkort</button>
            </div>
          </div>
        </div>
      </div>

      <div class="accordion">
        <button class="accordion-toggle" id="lyd-toggle" type="button">
          <span>🔊 Lydvarsler: <span class="valgt" id="lyd-valgt">Av</span></span>
          <span class="chev">▾</span>
        </button>

  <script>
    /* ================================================================
       🎵 SPILLELISTE: Legg inn sangene dine her!
       
       Hver sang trenger en tittel og en MP3-lenke (f.eks. fra
       pixabay.com/music - gratis musikk uten opphavsrettsproblemer).
       
       Bare kopier linje-malen under og lim inn så mange du vil:
       
       SPILLELISTE.push({ tittel: "Sangnavn her", url: "https://lenke-til-mp3-her.mp3" });
       
       Eksempel:
       SPILLELISTE.push({ tittel: "Cyber Dreams", url: "https://cdn.pixabay.com/audio/2024/abc123.mp3" });
       
       Hvis listen står tom, spiller den en innebygd synth-loop i stedet.
    ================================================================ */
    const SPILLELISTE = [];

    SPILLELISTE.push({ tittel: "everything in its right place", url: "musikk/radiohead - everything in its right place.mp3" });
    SPILLELISTE.push({ tittel: "Karma Police", url: "musikk/Karma Police.mp3" });
    

    // SPILLELISTE.push({ tittel: "", url: "" });
    // SPILLELISTE.push({ tittel: "", url: "" });
    // SPILLELISTE.push({ tittel: "", url: "" });

    const FAVORITT_NOKKEL = 'kortvakt_favoritter';
    const TEMA_NOKKEL = 'kortvakt_tema';
    const LYD_NOKKEL = 'kortvakt_lyd';
    let alleFunn = [];
    let aktivFane = 'alle';
    let aktivSport = 'alt';
    let sokeTekst = '';
    let kjenteLenker = null;

    const grid = document.getElementById('grid');
    const statusText = document.getElementById('status-text');
    const refreshBtn = document.getElementById('refresh-btn');
    const tabsEl = document.getElementById('tabs');
    const sportTabsEl = document.getElementById('sport-tabs');
    const themeToggle = document.getElementById('theme-toggle');
    const searchInput = document.getElementById('search-input');

    /* ============ CUSTOM CURSOR ============ */
    (function customCursor() {
      const ring = document.getElementById('cursor-ring');
      const dot = document.getElementById('cursor-dot');
      if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

      let musX = -100, musY = -100;
      let ringX = -100, ringY = -100;

      document.addEventListener('mousemove', (e) => {
        musX = e.clientX; musY = e.clientY;
        dot.style.left = musX + 'px';
        dot.style.top = musY + 'px';
      });
      document.addEventListener('mousedown', () => ring.classList.add('klikk'));
      document.addEventListener('mouseup', () => ring.classList.remove('klikk'));

      const reduserBevegelse = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      function animer() {
        // Ringen "jager" musen med smooth forsinkelse
        ringX += (musX - ringX) * (reduserBevegelse ? 1 : 0.16);
        ringY += (musY - ringY) * (reduserBevegelse ? 1 : 0.16);
        ring.style.left = ringX + 'px';
        ring.style.top = ringY + 'px';
        requestAnimationFrame(animer);
      }
      animer();
    })();

    /* ============ LYDSYSTEM (varsler) ============ */
    const LYD_STANDARD = { andre: false, store_samlinger: false, sjeldne_glins: false, pris_pa_foresporsel: false };

    function hentLydInnstillinger() {
      try { return { ...LYD_STANDARD, ...JSON.parse(localStorage.getItem(LYD_NOKKEL) || '{}') }; }
      catch (e) { return { ...LYD_STANDARD }; }
    }
    function lagreLydInnstillinger(obj) { localStorage.setItem(LYD_NOKKEL, JSON.stringify(obj)); }

    let lydCtx = null;
    function hentLydKontekst() {
      if (!lydCtx) lydCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (lydCtx.state === 'suspended') lydCtx.resume();
      return lydCtx;
    }
    document.addEventListener('visibilitychange', () => {
      if (lydCtx && lydCtx.state === 'suspended') lydCtx.resume();
    });

    function spillTone(ctx, frekvens, start, varighet, type, volum) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frekvens, start);
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(volum, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + varighet);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start + varighet + 0.02);
    }

    const LYD_FUNKSJONER = {
      andre: () => {
        const ctx = hentLydKontekst(); const t = ctx.currentTime;
        spillTone(ctx, 900, t, 0.07, 'square', 0.10);
      },
      store_samlinger: () => {
        // Radar-ping + ka-ching kombo
        const ctx = hentLydKontekst(); const t = ctx.currentTime;
        spillTone(ctx, 1400, t, 0.35, 'sine', 0.16);
        spillTone(ctx, 1046.5, t + 0.18, 0.12, 'triangle', 0.20);
        spillTone(ctx, 1568, t + 0.26, 0.30, 'triangle', 0.22);
      },
      sjeldne_glins: () => {
        const ctx = hentLydKontekst(); const t = ctx.currentTime;
        [1046.5, 1318.5, 1568, 2093].forEach((f, i) => spillTone(ctx, f, t + i * 0.06, 0.2, 'sine', 0.13));
      },
      pris_pa_foresporsel: () => {
        const ctx = hentLydKontekst(); const t = ctx.currentTime;
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(150, t + 0.12);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
        osc.connect(gain).connect(ctx.destination);
        osc.start(t); osc.stop(t + 0.15);
      },
    };

    function spillLyd(kategori) {
      try { (LYD_FUNKSJONER[kategori] || LYD_FUNKSJONER.andre)(); }
      catch (e) { console.warn('Kunne ikke spille lyd:', e); }
    }

    function oppdaterLydUI() {
      const innstillinger = hentLydInnstillinger();
      const antallPa = Object.values(innstillinger).filter(Boolean).length;
      document.getElementById('lyd-valgt').textContent = antallPa === 0 ? 'Av' : `${antallPa} på`;
      document.querySelectorAll('.lyd-toggle').forEach(btn => {
        btn.classList.toggle('on', !!innstillinger[btn.dataset.lydKategori]);
      });
    }

    document.querySelectorAll('.lyd-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const innstillinger = hentLydInnstillinger();
        const kat = btn.dataset.lydKategori;
        innstillinger[kat] = !innstillinger[kat];
        lagreLydInnstillinger(innstillinger);
        oppdaterLydUI();
        if (innstillinger[kat]) spillLyd(kat);
      });
    });
    document.querySelectorAll('[data-test-lyd]').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); spillLyd(btn.dataset.testLyd); });
    });

    function spillLydForNyeFunn(nyeFunn) {
      const innstillinger = hentLydInnstillinger();
      const kategorierMedNytt = new Set(nyeFunn.map(f => f.kategori || 'andre'));
      let forsinkelse = 0;
      kategorierMedNytt.forEach(kat => {
        if (innstillinger[kat]) {
          setTimeout(() => spillLyd(kat), forsinkelse);
          forsinkelse += 300;
        }
      });
    }

    /* ============ MUSIKKSPILLER ============ */
    (function musikkSpiller() {
      const knapp = document.getElementById('music-btn');
      const prevKnapp = document.getElementById('prev-btn');
      const nextKnapp = document.getElementById('next-btn');
      const nowPlaying = document.getElementById('now-playing');
      const visualizer = document.getElementById('visualizer');
      const stolper = visualizer.querySelectorAll('span');
      const volSlider = document.getElementById('vol-slider');

      let spiller = false;
      let sangIndeks = 0;
      let audioEl = null;
      let analyser = null;
      let dataArray = null;
      let syntLoop = null;
      let gainNode = null;
      let rafId = null;

      const harSanger = () => SPILLELISTE.length > 0;

      function visTittel() {
        if (!spiller) {
          nowPlaying.classList.remove('spiller');
          nowPlaying.textContent = harSanger()
            ? `${SPILLELISTE[sangIndeks].tittel} (pauset)`
            : 'Ingen sanger lagt til ennå';
          return;
        }
        nowPlaying.classList.add('spiller');
        nowPlaying.textContent = harSanger()
          ? SPILLELISTE[sangIndeks].tittel
          : 'Innebygd synth-loop';
      }

      function stoppLydkilder() {
        if (audioEl) {
          audioEl.pause();
          audioEl.onended = null;
          audioEl = null;
          analyser = null;
        }
        if (syntLoop) { clearInterval(syntLoop); syntLoop = null; }
      }

      function startSang(indeks) {
        stoppLydkilder();
        sangIndeks = ((indeks % SPILLELISTE.length) + SPILLELISTE.length) % SPILLELISTE.length;
        const sang = SPILLELISTE[sangIndeks];
        const ctx = hentLydKontekst();

        audioEl = new Audio(sang.url);
        audioEl.crossOrigin = 'anonymous';
        audioEl.volume = volSlider.value / 100;
        // Auto-hopp til neste sang når denne er ferdig
        audioEl.onended = () => startSang(sangIndeks + 1);
        audioEl.play().catch(e => {
          console.warn('Kunne ikke spille sangen:', sang.tittel, e);
          nowPlaying.textContent = `⚠ Feil ved avspilling: ${sang.tittel}`;
        });

        try {
          const kilde = ctx.createMediaElementSource(audioEl);
          analyser = ctx.createAnalyser();
          analyser.fftSize = 32;
          dataArray = new Uint8Array(analyser.frequencyBinCount);
          kilde.connect(analyser).connect(ctx.destination);
        } catch (e) {
          analyser = null;
        }
        visTittel();
      }

      function startSyntLoop() {
        stoppLydkilder();
        const ctx = hentLydKontekst();
        gainNode = ctx.createGain();
        gainNode.gain.value = (volSlider.value / 100) * 0.14;
        gainNode.connect(ctx.destination);

        const toner = [110, 130.8, 164.8, 196, 164.8, 130.8];
        let steg = 0;
        syntLoop = setInterval(() => {
          const t = ctx.currentTime;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.value = toner[steg % toner.length];
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(1, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
          osc.connect(g).connect(gainNode);
          osc.start(t); osc.stop(t + 0.45);
          steg++;
        }, 450);
        visTittel();
      }

      function animerVisualizer() {
        if (!spiller) return;
        if (analyser && dataArray) {
          analyser.getByteFrequencyData(dataArray);
          stolper.forEach((s, i) => {
            const verdi = dataArray[Math.floor(i * dataArray.length / stolper.length)] / 255;
            s.style.height = Math.max(12, verdi * 100) + '%';
          });
        } else {
          stolper.forEach((s) => { s.style.height = (15 + Math.random() * 80) + '%'; });
        }
        rafId = requestAnimationFrame(() => setTimeout(animerVisualizer, analyser ? 0 : 90));
      }

      function start() {
        if (harSanger()) startSang(sangIndeks); else startSyntLoop();
        spiller = true;
        knapp.textContent = '⏸';
        visTittel();
        animerVisualizer();
      }

      function stopp() {
        stoppLydkilder();
        spiller = false;
        knapp.textContent = '▶';
        visTittel();
        cancelAnimationFrame(rafId);
        stolper.forEach(s => s.style.height = '15%');
      }

      knapp.addEventListener('click', () => spiller ? stopp() : start());

      prevKnapp.addEventListener('click', () => {
        if (!harSanger()) return;
        sangIndeks = sangIndeks - 1;
        if (spiller) startSang(sangIndeks); else visTittel();
      });
      nextKnapp.addEventListener('click', () => {
        if (!harSanger()) return;
        sangIndeks = sangIndeks + 1;
        if (spiller) startSang(sangIndeks); else visTittel();
      });

      volSlider.addEventListener('input', () => {
        const v = volSlider.value / 100;
        if (audioEl) audioEl.volume = v;
        if (gainNode) gainNode.gain.value = v * 0.14;
      });

      visTittel();
    })();

    /* ============ ACCORDIONS ============ */
    const kategoriToggle = document.getElementById('kategori-toggle');
    const kategoriPanel = document.getElementById('kategori-panel');
    const kategoriValgt = document.getElementById('kategori-valgt');
    const sportToggle = document.getElementById('sport-toggle');
    const sportPanel = document.getElementById('sport-panel');
    const sportValgt = document.getElementById('sport-valgt');
    const lydToggleKnapp = document.getElementById('lyd-toggle');
    const lydPanel = document.getElementById('lyd-panel');

    const KATEGORI_LABEL = {
      alle: '🗂️ Alle', store_samlinger: '📦 Store samlinger', sjeldne_glins: '✨ Sjeldne & glins',
      pris_pa_foresporsel: '💬 Pris på forespørsel', favoritter: '⭐ Mine favoritter',
    };
    const SPORT_LABEL = { alt: 'Alt', pokemon: '🟡 Pokémon', fotball: '🟢 Fotballkort', basketball: '🟠 Basketballkort' };

    function toggleAccordion(toggleBtn, panel, lukkAndre) {
      const erApen = panel.classList.contains('open');
      lukkAndre();
      if (!erApen) { panel.classList.add('open'); toggleBtn.classList.add('open'); }
    }
    kategoriToggle.addEventListener('click', () => {
      toggleAccordion(kategoriToggle, kategoriPanel, () => {
        sportPanel.classList.remove('open'); sportToggle.classList.remove('open');
        lydPanel.classList.remove('open'); lydToggleKnapp.classList.remove('open');
      });
    });
    sportToggle.addEventListener('click', () => {
      toggleAccordion(sportToggle, sportPanel, () => {
        kategoriPanel.classList.remove('open'); kategoriToggle.classList.remove('open');
        lydPanel.classList.remove('open'); lydToggleKnapp.classList.remove('open');
      });
    });
    lydToggleKnapp.addEventListener('click', () => {
      toggleAccordion(lydToggleKnapp, lydPanel, () => {
        kategoriPanel.classList.remove('open'); kategoriToggle.classList.remove('open');
        sportPanel.classList.remove('open'); sportToggle.classList.remove('open');
      });
    });

    /* ============ TEMA ============ */
    function settTema(tema) {
      document.documentElement.setAttribute('data-theme', tema);
      themeToggle.textContent = tema === 'dark' ? '🌙 Mørk' : '☀️ Lys';
      localStorage.setItem(TEMA_NOKKEL, tema);
    }
    (function lastTema() { settTema(localStorage.getItem(TEMA_NOKKEL) === 'light' ? 'light' : 'dark'); })();
    themeToggle.addEventListener('click', () => {
      settTema(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });

    /* ============ FAVORITTER ============ */
    function hentFavoritter() {
      try { return JSON.parse(localStorage.getItem(FAVORITT_NOKKEL) || '[]'); } catch (e) { return []; }
    }
    function lagreFavoritter(liste) { localStorage.setItem(FAVORITT_NOKKEL, JSON.stringify(liste)); }
    function erFavoritt(lenke) { return hentFavoritter().includes(lenke); }
    function toggleFavoritt(lenke, knappEl) {
      let liste = hentFavoritter();
      liste = liste.includes(lenke) ? liste.filter(l => l !== lenke) : [...liste, lenke];
      lagreFavoritter(liste);
      if (knappEl) { knappEl.classList.add('pop'); setTimeout(() => knappEl.classList.remove('pop'), 400); }
      tegnAlt();
    }

    /* ============ TID / KATEGORIER ============ */
    function relativTid(isoStreng) {
      if (!isoStreng) return '';
      const da = new Date(isoStreng);
      const sekunder = Math.floor((new Date() - da) / 1000);
      if (sekunder < 60) return 'akkurat nå';
      const minutter = Math.floor(sekunder / 60);
      if (minutter < 60) return `for ${minutter} min siden`;
      const timer = Math.floor(minutter / 60);
      if (timer < 24) return `for ${timer} t siden`;
      return `for ${Math.floor(timer / 24)} d siden`;
    }

    const KATEGORI_MERKE = {
      store_samlinger: '📦 Stor samling', sjeldne_glins: '✨ Sjelden / glins',
      andre: '🃏 Kort', pris_pa_foresporsel: '💬 Pris på forespørsel',
    };

    function finnSport(tittel) {
      const t = (tittel || '').toLowerCase();
      if (t.includes('pokemon') || t.includes('pokémon')) return 'pokemon';
      if (t.includes('fotball')) return 'fotball';
      if (t.includes('basketball') || t.includes('nba')) return 'basketball';
      return 'annet';
    }

    function oppdaterTellere() {
      const fav = hentFavoritter();
      const tellereKategori = { alle: alleFunn.length, favoritter: alleFunn.filter(f => fav.includes(f.lenke)).length };
      ['store_samlinger', 'sjeldne_glins', 'pris_pa_foresporsel'].forEach(k => {
        tellereKategori[k] = alleFunn.filter(f => (f.kategori || 'andre') === k).length;
      });
      tabsEl.querySelectorAll('.tab-btn').forEach(btn => {
        const tekst = btn.textContent.replace(/\s*\(\d+\)$/, '');
        btn.textContent = `${tekst} (${tellereKategori[btn.dataset.fane] ?? 0})`;
      });
      const tellereSport = { alt: alleFunn.length };
      ['pokemon', 'fotball', 'basketball'].forEach(s => {
        tellereSport[s] = alleFunn.filter(f => finnSport(f.tittel) === s).length;
      });
      sportTabsEl.querySelectorAll('.tab-btn').forEach(btn => {
        const tekst = btn.textContent.replace(/\s*\(\d+\)$/, '');
        btn.textContent = `${tekst} (${tellereSport[btn.dataset.sport] ?? 0})`;
      });
    }

    /* ============ RENDRING ============ */
    function lagKort(funn, indeks) {
      const erNytt = funn.funnet && (new Date() - new Date(funn.funnet)) < 60 * 60 * 1000;
      const budAnnonse = !!funn.pris_pa_foresporsel;
      const pris = budAnnonse
        ? '💬 Kom med bud / spør'
        : ((funn.pris !== null && funn.pris !== undefined) ? `${funn.pris} kr` : 'Pris ikke oppgitt');
      const kategori = funn.kategori || 'andre';
      const favoritt = erFavoritt(funn.lenke);

      const kort = document.createElement('article');
      kort.className = 'card';
      kort.style.animationDelay = `${Math.min(indeks, 12) * 45}ms`;
      kort.innerHTML = `
        <button class="heart-btn ${favoritt ? 'aktiv' : ''}" data-lenke="${funn.lenke}" aria-label="Legg til i favoritter">${favoritt ? '♥' : '♡'}</button>
        <span class="kategori-merke">${KATEGORI_MERKE[kategori] || '🃏 Kort'}${erNytt ? ' · NYTT' : ''}</span>
        <span class="price-tag ${budAnnonse ? 'bud' : ''}">${pris}</span>
        <h2>${funn.tittel}</h2>
        <div><a class="cta-btn" href="${funn.lenke}" target="_blank" rel="noopener">🔗 Åpne på Finn.no</a></div>
        <span class="found-at">Funnet ${relativTid(funn.funnet)}</span>
      `;
      return kort;
    }

    function filtrerFunn() {
      let liste = alleFunn;
      if (aktivFane === 'favoritter') {
        const fav = hentFavoritter();
        liste = liste.filter(f => fav.includes(f.lenke));
      } else if (aktivFane !== 'alle') {
        liste = liste.filter(f => (f.kategori || 'andre') === aktivFane);
      }
      if (aktivSport !== 'alt') liste = liste.filter(f => finnSport(f.tittel) === aktivSport);
      if (sokeTekst.trim() !== '') {
        const s = sokeTekst.toLowerCase();
        liste = liste.filter(f => (f.tittel || '').toLowerCase().includes(s));
      }
      return liste;
    }

    function tomMelding() {
      if (sokeTekst.trim() !== '') return { tittel: 'Ingen treff på søket', tekst: `Fant ingenting som matcher «${sokeTekst}».` };
      if (aktivFane === 'favoritter') return { tittel: 'Ingen favoritter ennå', tekst: 'Trykk på hjertet på et kort for å lagre det her.' };
      if (aktivFane === 'pris_pa_foresporsel') return { tittel: 'Ingen slike ennå', tekst: 'Her havner annonser der selgeren skriver "kom med bud" eller "spør om pris".' };
      return { tittel: 'Ingen treff ennå', tekst: 'Roboten sjekker Finn jevnlig. Denne siden oppdaterer seg selv når den finner noe.' };
    }

    function tegnAlt() {
      kategoriValgt.textContent = KATEGORI_LABEL[aktivFane];
      sportValgt.textContent = SPORT_LABEL[aktivSport];
      oppdaterTellere();
      const funnListe = filtrerFunn();
      grid.innerHTML = '';
      if (funnListe.length === 0) {
        const m = tomMelding();
        grid.innerHTML = `<div class="empty"><strong>${m.tittel}</strong>${m.tekst}</div>`;
        return;
      }
      funnListe.forEach((f, i) => grid.appendChild(lagKort(f, i)));
    }

    tabsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('aktiv'));
      btn.classList.add('aktiv');
      aktivFane = btn.dataset.fane;
      kategoriPanel.classList.remove('open'); kategoriToggle.classList.remove('open');
      tegnAlt();
    });
    sportTabsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.sport-btn');
      if (!btn) return;
      sportTabsEl.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('aktiv'));
      btn.classList.add('aktiv');
      aktivSport = btn.dataset.sport;
      sportPanel.classList.remove('open'); sportToggle.classList.remove('open');
      tegnAlt();
    });
    searchInput.addEventListener('input', (e) => { sokeTekst = e.target.value; tegnAlt(); });
    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.heart-btn');
      if (!btn) return;
      toggleFavoritt(btn.dataset.lenke, btn);
    });

    /* ============ DATA ============ */
    async function lastFunn() {
      statusText.textContent = 'Laster...';
      try {
        const respons = await fetch(`funn.json?_=${Date.now()}`, { cache: 'no-store' });
        const data = await respons.json();
        alleFunn = data.funn || [];

        if (kjenteLenker === null) {
          kjenteLenker = new Set(alleFunn.map(f => f.lenke));
        } else {
          const nyeFunn = alleFunn.filter(f => !kjenteLenker.has(f.lenke));
          kjenteLenker = new Set(alleFunn.map(f => f.lenke));
          if (nyeFunn.length > 0) spillLydForNyeFunn(nyeFunn);
        }

        tegnAlt();
        statusText.textContent = data.sist_sjekket
          ? `Sist sjekket ${relativTid(data.sist_sjekket)} · ${alleFunn.length} treff totalt`
          : `${alleFunn.length} treff totalt`;
      } catch (e) {
        statusText.textContent = 'Klarte ikke å laste funn.json ennå.';
      }
    }
    refreshBtn.addEventListener('click', lastFunn);
    oppdaterLydUI();
    lastFunn();
    setInterval(lastFunn, 60 * 1000);

    /* ============ LIVE-LOGG ============ */
    const logLinjer = document.getElementById('terminal-lines');
    const logMaler = [
      'Skanner Finn.no etter kortsamlinger...', 'Sjekker pris- og nøkkelordfilter...',
      'Analyserer nye annonser...', 'Sammenligner mot tidligere sette annonser...',
      'Ingen nye treff i denne runden.', 'Venter til neste sjekk...',
    ];
    function leggTilLoggLinje() {
      const tid = new Date().toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
      const tekst = logMaler[Math.floor(Math.random() * logMaler.length)];
      [...logLinjer.children].forEach(l => l.classList.remove('siste'));
      const linje = document.createElement('div');
      linje.className = 'siste';
      linje.textContent = `[${tid}] ${tekst}`;
      logLinjer.appendChild(linje);
      requestAnimationFrame(() => requestAnimationFrame(() => linje.classList.add('vis')));
      while (logLinjer.children.length > 6) {
        const eldste = logLinjer.firstChild;
        eldste.classList.remove('vis');
        eldste.classList.add('ut');
        setTimeout(() => eldste.remove(), 450);
        break;
      }
    }
    leggTilLoggLinje();
    setInterval(leggTilLoggLinje, 4000);
  </script>
</body>
</html>
